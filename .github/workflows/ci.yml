name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: pip install flake8

      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names; ignore line-length and style
          flake8 core/ ui/app.py scripts/ \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics

      - name: Check all Python files parse cleanly
        run: |
          python -c "
          import ast, sys, pathlib
          errors = []
          for p in pathlib.Path('.').rglob('*.py'):
              if 'venv' in p.parts or '__pycache__' in p.parts:
                  continue
              try:
                  ast.parse(p.read_text())
              except SyntaxError as e:
                  errors.append(f'{p}: {e}')
          if errors:
              print('Syntax errors found:')
              for e in errors: print(' ', e)
              sys.exit(1)
          print(f'All Python files parse cleanly.')
          "

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          # Install only what tests need — no Ollama/Qdrant/fastembed at runtime
          pip install \
            Flask \
            PyYAML \
            qdrant-client \
            pytest \
            pytest-flask

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
