chunking:
  overlap: 200
  size: 600
eval:
  counterfactual: true
  spans_per_doc: 5
models:
  embedding: nomic-embed-text
  ollama_url: http://localhost:11434
  reasoning: qwen2.5:14b
  vision: qwen2.5vl:7b
retrieval:
  threshold: 0.7
  top_k: 5
vision:
  page_chars_min: 30
video:
  max_frames_per_segment: 12   # V-JEPA keyframe budget per 2-minute page
  frame_sample_rate: 5         # ffmpeg: extract 1 frame per N seconds (candidates)

video_generation:
  model: "Lightricks/LTX-Video"   # or "THUDM/CogVideoX-2b" for lower VRAM
  fps: 8
  width: 512
  height: 288
watch:
  extensions:
  - .pdf
  - .docx
  - .txt
  - .png
  - .jpg
  - .csv
  - .xlsx
  folders:
  - /Users/dallassellers/Documents/UniversityOfColorodoBoulder
